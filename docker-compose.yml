services:
  postgres:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secretpass
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - guess_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend1:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: guess-game-backend:1.0
    restart: always
    environment:
      FLASK_APP: run.py
      FLASK_DB_TYPE: postgres
      FLASK_DB_USER: postgres
      FLASK_DB_NAME: postgres
      FLASK_DB_PASSWORD: secretpass
      FLASK_DB_HOST: postgres
      FLASK_DB_PORT: 5432
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - guess_net

  backend2:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: guess-game-backend:1.0
    restart: always
    environment:
      FLASK_APP: run.py
      FLASK_DB_TYPE: postgres
      FLASK_DB_USER: postgres
      FLASK_DB_NAME: postgres
      FLASK_DB_PASSWORD: secretpass
      FLASK_DB_HOST: postgres
      FLASK_DB_PORT: 5432
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - guess_net

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    image: guess-game-frontend:1.0
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - backend1
      - backend2
    networks:
      - guess_net

volumes:
  postgres_data:

networks:
  guess_net:
    driver: bridge